version: '3'

tasks:
  validate:
    desc: Validate workstation tools and configuration
    cmds:
      - ./Scripts/validate-workstation.sh

  update:
    desc: Update packages and local repositories
    cmds:
      - ./Scripts/update-workstation.sh

  repos:sync:
    desc: Sync GitHub repositories
    cmds:
      - ./Scripts/sync-github-repos.sh

  repos:status:
    desc: Check all repos for local changes
    cmds:
      - ./Scripts/repo-status.sh

  docker:clean:
    desc: Clean Docker unused resources
    cmds:
      - ./Scripts/clean-docker.sh

  info:
    desc: Show workstation information
    cmds:
      - ./Scripts/workstation-info.sh

  bootstrap:
    desc: Run full workstation bootstrap
    cmds:
      - ./bootstrap.sh

  dotfiles:backup:
    desc: Back up local workstation configs
    cmds:
      - ./Scripts/backup-configs.sh

  project:new:
    desc: Create a new project
    cmds:
      - ./Scripts/new-project.sh {{.CLI_ARGS}}

  open:
    desc: Open common workstation projects
    cmds:
      - ./Scripts/open-workstation.sh

  security:scan:
    desc: Scan repo for obvious secrets
    cmds:
      - ./Scripts/security-scan-repo.sh

  adr:note:
    desc: Show private ADR reminder
    cmds:
      - ./Scripts/adr-note.sh

  configs:save:
    desc: Save live configs into repo
    cmds:
      - ./Scripts/save-live-configs.sh

  repos:duplicates:
    desc: Check duplicate project directories
    cmds:
      - ./Scripts/check-duplicates.sh

  health:
    desc: Run full workstation health check
    cmds:
      - ./Scripts/health-check.sh

  repo:summary:
    desc: Show workstation repository summary
    cmds:
      - ./Scripts/repo-summary.sh
